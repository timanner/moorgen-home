<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MOORGEN · 摩根智能家居</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Noto+Sans+SC:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #080809;
    --bg-secondary: #0f0f11;
    --bg-card: #131315;
    --bg-card-hover: #1a1a1d;
    --gold: #C9A96E;
    --gold-light: #E8C98A;
    --gold-dim: #8B7248;
    --text-primary: #F0EBE0;
    --text-secondary: #8A8580;
    --text-muted: #4A4640;
    --border: rgba(201,169,110,0.15);
    --border-active: rgba(201,169,110,0.5);
    --glow: rgba(201,169,110,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; background: var(--bg-primary); overflow: hidden; }
  body { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
  #root { width: 100%; height: 100%; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 1px; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse-gold { 0%,100% { box-shadow: 0 0 0 0 rgba(201,169,110,0); } 50% { box-shadow: 0 0 20px 4px rgba(201,169,110,0.15); } }
  @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
  @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes ripple { 0% { transform: scale(0); opacity: 0.6; } 100% { transform: scale(4); opacity: 0; } }
  @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes blindsOpen { from { clip-path: inset(0 0 100% 0); } to { clip-path: inset(0 0 0% 0); } }

  .fade-in { animation: fadeIn 0.4s ease forwards; }
  .slide-in { animation: slideInLeft 0.3s ease forwards; }

  /* Knob */
  .knob-container { position: relative; cursor: pointer; user-select: none; }
  .knob-track { fill: none; stroke: rgba(255,255,255,0.05); stroke-linecap: round; }
  .knob-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset 0.3s ease; }
  .knob-center { transition: all 0.3s ease; }

  /* Glassmorphism card */
  .glass-card {
    background: rgba(20,20,22,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .glass-card:hover { border-color: var(--border-active); background: rgba(25,25,28,0.9); }
  .glass-card.active { border-color: rgba(201,169,110,0.6); background: rgba(30,28,22,0.9); }

  /* Toggle switch */
  .toggle { width: 44px; height: 24px; background: rgba(255,255,255,0.08); border-radius: 12px; position: relative; cursor: pointer; transition: background 0.3s; border: 1px solid rgba(255,255,255,0.06); }
  .toggle.on { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); }
  .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 2px 6px rgba(0,0,0,0.4); }
  .toggle.on::after { transform: translateX(20px); }

  /* Range slider */
  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 3px; border-radius: 2px; outline: none; cursor: pointer; background: rgba(255,255,255,0.08); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--gold); cursor: pointer; box-shadow: 0 0 8px rgba(201,169,110,0.5); }

  /* Room tab */
  .room-tab { transition: all 0.25s ease; cursor: pointer; }
  .room-tab:hover .room-icon { opacity: 1; }
  .room-tab.active .room-icon { color: var(--gold); }

  /* Scene card */
  .scene-card { cursor: pointer; transition: all 0.3s ease; }
  .scene-card:hover { transform: translateY(-2px); }
  .scene-card.active { border-color: rgba(201,169,110,0.7) !important; }

  /* Camera grid */
  .cam-feed { position: relative; overflow: hidden; background: #0a0a0c; }
  .cam-feed::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 60%, rgba(201,169,110,0.03)); pointer-events: none; }
  .scanline { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, rgba(201,169,110,0.3), transparent); animation: scan 4s linear infinite; }
  @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

  /* Gold gradient text */
  .gold-text { background: linear-gradient(135deg, #C9A96E, #E8C98A, #C9A96E); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; background-size: 200%; animation: shimmer 4s ease infinite; }

  /* Music progress */
  .progress-bar { height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; cursor: pointer; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); border-radius: 1px; transition: width 0.1s linear; }

  /* Curtain visual */
  .curtain-vis { height: 60px; position: relative; overflow: hidden; }
  .curtain-left, .curtain-right { position: absolute; top: 0; height: 100%; background: linear-gradient(180deg, #2a2015 0%, #1a1408 100%); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .curtain-left { left: 0; }
  .curtain-right { right: 0; }

  /* Status dot */
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.online { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .status-dot.offline { background: var(--text-muted); }
  .status-dot.alert { background: #f87171; box-shadow: 0 0 6px #f87171; animation: pulse-gold 1.5s ease infinite; }

  /* Notification badge */
  .badge { background: #f87171; color: white; font-size: 10px; min-width: 16px; height: 16px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }

  /* Lock screen overlay */
  .lock-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(40px); }

  /* Sector path animation */
  .sector-arc { transition: stroke-dashoffset 0.4s cubic-bezier(0.4,0,0.2,1); }

  /* ── A: Particle canvas ── */
  #particle-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.5; }

  /* ── A: Ripple on click ── */
  .ripple-wrap { position:relative; overflow:hidden; }
  .ripple-effect { position:absolute; border-radius:50%; background:rgba(201,169,110,0.25); transform:scale(0); animation:ripple 0.6s ease-out forwards; pointer-events:none; }

  /* ── A: Gold glow breathe on active cards ── */
  .glass-card.active { animation: card-glow 3s ease infinite; }
  @keyframes card-glow {
    0%,100% { box-shadow: 0 0 0 0 rgba(201,169,110,0); }
    50%      { box-shadow: 0 0 24px 2px rgba(201,169,110,0.12); }
  }

  /* ── B: Waveform bars ── */
  .wave-bar { display:inline-block; width:3px; border-radius:2px; background:linear-gradient(180deg,var(--gold),var(--gold-dim)); transform-origin:bottom; animation:wave-dance var(--dur,0.8s) ease-in-out infinite alternate; }
  @keyframes wave-dance { from { transform:scaleY(0.15); } to { transform:scaleY(1); } }

  /* ── B: Animated counter ── */
  .count-up { display:inline-block; transition:all 0.6s cubic-bezier(0.4,0,0.2,1); }

  /* ── C: Page slide transition ── */
  .page-enter { animation: pageSlideIn 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
  @keyframes pageSlideIn {
    from { opacity:0; transform:translateX(18px); }
    to   { opacity:1; transform:translateX(0); }
  }

  /* ── C: Card shimmer sweep ── */
  .glass-card { position:relative; overflow:hidden; }
  .glass-card::before {
    content:'';
    position:absolute;
    top:0; left:-100%; width:60%; height:100%;
    background:linear-gradient(90deg, transparent, rgba(201,169,110,0.06), transparent);
    transform:skewX(-20deg);
    transition:none;
    pointer-events:none;
  }
  .glass-card:hover::before { left:160%; transition:left 0.7s ease; }

  /* ── C: Scene switch bg flash ── */
  .scene-flash { animation: sceneFlash 0.5s ease forwards; }
  @keyframes sceneFlash {
    0%   { background-color: rgba(201,169,110,0.04); }
    100% { background-color: transparent; }
  }

  /* ── Top bar gold line ── */
  .topbar-line {
    position:absolute; bottom:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent 0%, rgba(201,169,110,0.5) 30%, rgba(232,201,138,0.8) 50%, rgba(201,169,110,0.5) 70%, transparent 100%);
    background-size:200% 100%;
    animation:shimmer 4s ease infinite;
  }

  /* ── Lock screen particles ── */
  .lock-particle { position:absolute; border-radius:50%; background:rgba(201,169,110,0.6); animation:float-up var(--dur,6s) ease-in infinite; }
  @keyframes float-up {
    0%   { transform:translateY(0) scale(1); opacity:0.6; }
    100% { transform:translateY(-100vh) scale(0.2); opacity:0; }
  }
</style>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── A: Particle engine ────────────────────────────────────────────────────────
const initParticles = () => {
  const canvas = document.getElementById('particle-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], raf;
  const resize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 55; i++) particles.push({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.5+0.3,
    vx: (Math.random()-0.5)*0.18, vy: (Math.random()-0.5)*0.18,
    a: Math.random()*0.5+0.1,
  });
  const draw = () => {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x<0) p.x=W; if (p.x>W) p.x=0;
      if (p.y<0) p.y=H; if (p.y>H) p.y=0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(201,169,110,${p.a})`;
      ctx.fill();
    });
    // draw faint connecting lines
    for (let i=0;i<particles.length;i++) for (let j=i+1;j<particles.length;j++) {
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if (dist<120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x,particles[i].y);
        ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=`rgba(201,169,110,${0.06*(1-dist/120)})`;
        ctx.lineWidth=0.5;
        ctx.stroke();
      }
    }
    raf = requestAnimationFrame(draw);
  };
  draw();
  return () => { cancelAnimationFrame(raf); window.removeEventListener('resize',resize); };
};

// ── A: Ripple helper ──────────────────────────────────────────────────────────
const addRipple = (e) => {
  const el = e.currentTarget;
  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 2;
  const x = (e.clientX || e.touches?.[0]?.clientX || rect.left+rect.width/2) - rect.left - size/2;
  const y = (e.clientY || e.touches?.[0]?.clientY || rect.top+rect.height/2) - rect.top - size/2;
  const ripple = document.createElement('span');
  ripple.className = 'ripple-effect';
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
  el.appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);
};

// ── B: Animated counter ───────────────────────────────────────────────────────
const AnimatedNumber = ({ value, duration=600 }) => {
  const [display, setDisplay] = useState(value);
  const prev = useRef(value);
  useEffect(() => {
    if (prev.current === value) return;
    const start = prev.current, end = value, startTime = performance.now();
    const tick = (now) => {
      const t = Math.min((now-startTime)/duration, 1);
      const ease = t<0.5 ? 2*t*t : -1+(4-2*t)*t;
      setDisplay(Math.round(start + (end-start)*ease));
      if (t < 1) requestAnimationFrame(tick);
      else { setDisplay(end); prev.current = end; }
    };
    requestAnimationFrame(tick);
  }, [value, duration]);
  return <span className="count-up">{display}</span>;
};

// ── B: Mini waveform (music visualizer) ──────────────────────────────────────
const Waveform = ({ playing, bars=12 }) => (
  <div style={{ display:'flex', alignItems:'flex-end', gap:2, height:18 }}>
    {Array(bars).fill(0).map((_,i) => (
      <div key={i} className="wave-bar" style={{
        height: `${Math.round(30+Math.sin(i*1.3)*50)}%`,
        '--dur': `${0.5+Math.random()*0.6}s`,
        animationPlayState: playing ? 'running' : 'paused',
        opacity: playing ? 1 : 0.3,
      }}/>
    ))}
  </div>
);

// ── B: Mini sparkline chart ───────────────────────────────────────────────────
const Sparkline = ({ data, color='#C9A96E', width=80, height=28 }) => {
  const min = Math.min(...data), max = Math.max(...data);
  const pts = data.map((v,i) => {
    const x = (i/(data.length-1))*width;
    const y = height - ((v-min)/(max-min||1))*(height-4) - 2;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={width} height={height} style={{ overflow:'visible' }}>
      <defs>
        <linearGradient id={`sg-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ filter:`drop-shadow(0 0 3px ${color}80)` }}/>
    </svg>
  );
};

    garden: <><path d="M12 22V12"/><path d="M5 12H2a10 10 0 0020 0h-3"/><path d="M8 6c2-2 4-2 4-2s0 2-2 4-4 2-4 2 0-2 2-4z"/><path d="M16 6c-2-2-4-2-4-2s0 2 2 4 4 2 4 2 0-2-2-4z"/></>,
    sun: <><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>,

// ─── KNOB COMPONENT ───────────────────────────────────────────────────────────
const Knob = ({ value, onChange, min=0, max=100, size=100, label, unit='%', color='#C9A96E' }) => {
  const svgRef = useRef(null);
  const dragging = useRef(false);
  const startAngle = -225, endAngle = 45;
  const range = endAngle - startAngle;
  const pct = (value - min) / (max - min);
  const angle = startAngle + pct * range;
  const r = size * 0.38;
  const cx = size / 2, cy = size / 2;
  const circumference = 2 * Math.PI * r;
  const arcLength = (range / 360) * circumference;
  const fillLength = pct * arcLength;

  const polarToXY = (deg, radius) => {
    const rad = (deg - 90) * Math.PI / 180;
    return { x: cx + radius * Math.cos(rad), y: cy + radius * Math.sin(rad) };
  };

  const thumbPos = polarToXY(angle, r);

  const getAngleFromEvent = (e) => {
    const rect = svgRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const dx = clientX - rect.left - cx * (rect.width / size);
    const dy = clientY - rect.top - cy * (rect.height / size);
    let deg = Math.atan2(dy, dx) * 180 / Math.PI + 90;
    if (deg < 0) deg += 360;
    return deg;
  };

  const handleMove = useCallback((e) => {
    if (!dragging.current) return;
    e.preventDefault();
    let deg = getAngleFromEvent(e);
    let adj = deg - 135;
    if (adj < 0) adj += 360;
    if (adj > 270) adj = 270;
    const newPct = adj / 270;
    onChange(Math.round(min + newPct * (max - min)));
  }, [min, max, onChange]);

  const handleStart = (e) => { dragging.current = true; handleMove(e); };
  const handleEnd = () => { dragging.current = false; };

  useEffect(() => {
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', handleEnd);
    return () => {
      window.removeEventListener('mousemove', handleMove);
      window.removeEventListener('mouseup', handleEnd);
      window.removeEventListener('touchmove', handleMove);
      window.removeEventListener('touchend', handleEnd);
    };
  }, [handleMove]);

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
      <svg ref={svgRef} width={size} height={size} onMouseDown={handleStart} onTouchStart={handleStart} style={{ cursor:'pointer' }}>
        {/* Track */}
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="4" strokeDasharray={`${arcLength} ${circumference}`} strokeDashoffset={0} transform={`rotate(135 ${cx} ${cy})`} strokeLinecap="round"/>
        {/* Fill */}
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={value > 0 ? color : 'transparent'} strokeWidth="4" strokeDasharray={`${fillLength} ${circumference}`} strokeDashoffset={0} transform={`rotate(135 ${cx} ${cy})`} strokeLinecap="round" style={{ filter: value > 0 ? `drop-shadow(0 0 6px ${color}80)` : 'none', transition:'stroke-dasharray 0.3s ease' }}/>
        {/* Thumb */}
        {value > 0 && <circle cx={thumbPos.x} cy={thumbPos.y} r={4} fill={color} style={{ filter:`drop-shadow(0 0 4px ${color})` }}/>}
        {/* Center */}
        <circle cx={cx} cy={cy} r={r * 0.55} fill="rgba(20,20,22,0.9)" stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
        <text x={cx} y={cy - 4} textAnchor="middle" fill="#F0EBE0" fontSize={size * 0.16} fontWeight="300" fontFamily="Inter">{value}</text>
        <text x={cx} y={cy + size*0.13} textAnchor="middle" fill="#8A8580" fontSize={size * 0.1} fontFamily="Inter">{unit}</text>
      </svg>
      {label && <div style={{ color:'var(--text-secondary)', fontSize:11, letterSpacing:'0.08em', textTransform:'uppercase' }}>{label}</div>}
    </div>
  );
};

    garden: (
      <div className="glass-card" style={{ padding:'16px 20px' }}>
        <div style={{ color:'var(--text-secondary)', fontSize:11, letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:12 }}>庭院系统</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10 }}>
          {[['喷淋',true,'droplets'],['景观灯',true,'sun'],['门禁',false,'shield']].map(([name,on,icon]) => (
            <div key={name} className="glass-card" style={{ padding:'12px', textAlign:'center' }}>
              <div style={{ width:36, height:36, margin:'0 auto 8px', borderRadius:10, background: on ? 'rgba(201,169,110,0.12)' : 'rgba(255,255,255,0.03)', display:'flex', alignItems:'center', justifyContent:'center', border:`1px solid ${on?'rgba(201,169,110,0.3)':'transparent'}` }}>
                <Icon name={icon} size={16} color={on ? 'var(--gold)' : 'var(--text-muted)'}/>
              </div>
              <div style={{ fontSize:12, color: on ? 'var(--text-primary)' : 'var(--text-muted)' }}>{name}</div>
              <div style={{ fontSize:10, color: on ? 'var(--gold)':'var(--text-muted)', marginTop:2 }}>{on?'运行中':'已停止'}</div>
            </div>
          ))}
        </div>
      </div>
    ),
    kitchen: (
      <div className="glass-card" style={{ padding:'16px 20px' }}>
        <div style={{ color:'var(--text-secondary)', fontSize:11, letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:12 }}>厨房设备</div>
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {[['抽油烟机','低速运行','on'],['洗碗机','定时 22:00','schedule'],['净化器','PM2.5: 12','on']].map(([name,info,st]) => (
            <div key={name} className="glass-card" style={{ padding:'10px 14px', display:'flex', alignItems:'center', gap:12 }}>
              <div className={`status-dot ${st==='on'?'online':'offline'}`}/>
              <div style={{ flex:1 }}>
                <div style={{ color:'var(--text-primary)', fontSize:13 }}>{name}</div>
                <div style={{ color:'var(--text-muted)', fontSize:11 }}>{info}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    ),
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      {/* Main controls */}
      <div className="glass-card" style={{ padding:'20px 24px' }}>
        <div style={{ color:'var(--text-secondary)', fontSize:11, letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:20 }}>灯光 · 温度</div>
        <div style={{ display:'flex', justifyContent:'space-evenly', alignItems:'flex-start' }}>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16 }}>
            <Knob value={room.light} onChange={v => onUpdate({light:v})} label="亮度" unit="%" size={110}/>
            <div style={{ display:'flex', gap:8 }}>
              {[0,25,50,75,100].map(v => (
                <button key={v} onClick={() => onUpdate({light:v})} style={{ padding:'3px 8px', borderRadius:4, background: Math.abs(room.light-v)<5 ? 'rgba(201,169,110,0.2)' : 'rgba(255,255,255,0.04)', border:`1px solid ${Math.abs(room.light-v)<5?'rgba(201,169,110,0.4)':'rgba(255,255,255,0.06)'}`, color: Math.abs(room.light-v)<5?'var(--gold)':'var(--text-muted)', fontSize:11, cursor:'pointer' }}>{v}%</button>
              ))}
            </div>
          </div>
          <div style={{ width:1, height:120, background:'rgba(255,255,255,0.04)', alignSelf:'center' }}/>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12 }}>
            <Knob value={room.temp} onChange={v => onUpdate({temp:v})} min={16} max={30} label="温度" unit="°C" size={110} color="#60a5fa"/>
            <div style={{ display:'flex', gap:10, color:'var(--text-muted)', fontSize:12 }}>
              <div style={{ textAlign:'center' }}>
                <div style={{ fontSize:18, color:'var(--text-primary)', fontWeight:300 }}>{room.humidity}%</div>
                <div>湿度</div>
              </div>
              <div style={{ width:1, background:'rgba(255,255,255,0.04)' }}/>
              <div style={{ textAlign:'center' }}>
                <div style={{ fontSize:18, color:'var(--text-primary)', fontWeight:300 }}>{room.airQuality}</div>
                <div>空气</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Curtain */}
      <div className="glass-card" style={{ padding:'16px 20px' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <div style={{ color:'var(--text-secondary)', fontSize:11, letterSpacing:'0.12em', textTransform:'uppercase' }}>窗帘控制</div>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={() => onUpdate({curtain:0})} style={{ padding:'3px 10px', borderRadius:5, background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.06)', color:'var(--text-muted)', fontSize:11, cursor:'pointer' }}>全关</button>
            <button onClick={() => onUpdate({curtain:50})} style={{ padding:'3px 10px', borderRadius:5, background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.06)', color:'var(--text-muted)', fontSize:11, cursor:'pointer' }}>半开</button>
            <button onClick={() => onUpdate({curtain:100})} style={{ padding:'3px 10px', borderRadius:5, background:'rgba(201,169,110,0.1)', border:'1px solid rgba(201,169,110,0.3)', color:'var(--gold)', fontSize:11, cursor:'pointer' }}>全开</button>
          </div>
        </div>
        <CurtainControl value={room.curtain} onChange={v => onUpdate({curtain:v})}/>
      </div>

      {/* Music */}
      {roomId !== 'garden' && (
        <div className="glass-card" style={{ padding:'14px 20px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <Icon name="music" size={18} color={room.music ? 'var(--gold)' : 'var(--text-muted)'}/>
            <div>
              <div style={{ color:'var(--text-primary)', fontSize:13 }}>室内音乐</div>
              <div style={{ color:'var(--text-muted)', fontSize:11 }}>{room.music ? '播放中 · 同步主音源' : '已静音'}</div>
            </div>
          </div>
          <div className={`toggle ${room.music?'on':''}`} onClick={() => onUpdate({music:!room.music})}/>
        </div>
      )}

      {/* Extra features per room */}
      {extraFeatures[roomId]}
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const App = () => {
  const [state, setState] = useState(initialState);
  const [locked, setLocked] = useState(true);
  const [pin, setPin] = useState('');
  const [lockError, setLockError] = useState(false);
  const [sceneFlash, setSceneFlash] = useState(false);
  // sparkline history for energy
  const [energyHistory] = useState(() => Array(12).fill(0).map((_,i)=>20+Math.sin(i*0.8)*12+Math.random()*8));
  const [tempHistory] = useState(() => Array(12).fill(0).map((_,i)=>22+Math.sin(i*0.5)*2+Math.random()*1));

  // A: init particles
  useEffect(() => {
    const cleanup = initParticles();
    return cleanup;
  }, []);

  // Clock
  useEffect(() => {
    const t = setInterval(() => setState(s => ({...s, time: new Date()})), 1000);
    return () => clearInterval(t);
  }, []);

  const updateRoom = (roomId, data) => setState(s => ({
    ...s, rooms: { ...s.rooms, [roomId]: { ...s.rooms[roomId], ...data } }
  }));

  const applyScene = (scene) => {
    setSceneFlash(true);
    setTimeout(() => setSceneFlash(false), 500);
    setState(s => {
      const newRooms = { ...s.rooms };
      Object.entries(scene.lights).forEach(([id, light]) => {
        newRooms[id] = { ...newRooms[id], light, temp: scene.temp };
      });
      return { ...s, scene: scene.id, rooms: newRooms };
    });
  };

  const handlePin = (digit) => {
    const newPin = pin + digit;
    setPin(newPin);
    if (newPin.length === 4) {
      if (newPin === '1234') {
        setLocked(false);
        setPin('');
      } else {
        setLockError(true);
        setTimeout(() => { setPin(''); setLockError(false); }, 600);
      }
    }
  };

  const room = state.rooms[state.currentRoom];
  const timeStr = state.time.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
  const dateStr = state.time.toLocaleDateString('zh-CN', { month:'long', day:'numeric', weekday:'short' });

  // Lock screen
  if (locked) {
    const lockParticles = Array(18).fill(0).map((_,i) => ({
      left: `${Math.random()*100}%`,
      top: `${80+Math.random()*20}%`,
      size: Math.random()*3+1,
      dur: `${4+Math.random()*6}s`,
      delay: `${Math.random()*4}s`,
    }));
    return (
      <div className="lock-overlay" style={{ flexDirection:'column', gap:32, position:'relative', overflow:'hidden' }}>
        {/* floating particles */}
        {lockParticles.map((p,i) => (
          <div key={i} className="lock-particle" style={{ left:p.left, top:p.top, width:p.size, height:p.size, '--dur':p.dur, animationDelay:p.delay }}/>
        ))}
        {/* gold ring */}
        <div style={{ position:'absolute', width:320, height:320, borderRadius:'50%', border:'1px solid rgba(201,169,110,0.06)', top:'50%', left:'50%', transform:'translate(-50%,-50%)', pointerEvents:'none' }}/>
        <div style={{ position:'absolute', width:480, height:480, borderRadius:'50%', border:'1px solid rgba(201,169,110,0.03)', top:'50%', left:'50%', transform:'translate(-50%,-50%)', pointerEvents:'none' }}/>
        <div style={{ textAlign:'center', position:'relative' }}>
          <div style={{ fontSize:72, fontWeight:100, color:'var(--text-primary)', letterSpacing:'0.05em', lineHeight:1 }}>{timeStr}</div>
          <div style={{ color:'var(--text-secondary)', marginTop:8, fontSize:15, fontWeight:300 }}>{dateStr}</div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6, marginTop:16, color:'var(--text-muted)', fontSize:12 }}>
            <Icon name="wifi" size={12}/>
            <span>家庭网络已连接</span>
            <span style={{ margin:'0 8px', opacity:0.3 }}>|</span>
            <span style={{ color:'#4ade80' }}>所有系统正常</span>
          </div>
        </div>
        {/* PIN dots */}
        <div style={{ display:'flex', gap:16, justifyContent:'center' }}>
          {[0,1,2,3].map(i => (
            <div key={i} style={{ width:12, height:12, borderRadius:'50%', background: pin.length > i ? (lockError ? '#f87171' : 'var(--gold)') : 'rgba(255,255,255,0.15)', transition:'all 0.2s', boxShadow: pin.length > i && !lockError ? '0 0 10px rgba(201,169,110,0.6)' : 'none' }}/>
          ))}
        </div>
        {/* Keypad */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14, width:220 }}>
          {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((d,i) => (
            <button key={i} onClick={(e) => { addRipple(e); if(d==='⌫') setPin(p=>p.slice(0,-1)); else if(d!=='') handlePin(String(d)); }}
              className="ripple-wrap"
              style={{ height:60, borderRadius:14, background: d==='' ? 'transparent' : 'rgba(255,255,255,0.06)', border: d==='' ? 'none' : '1px solid rgba(255,255,255,0.08)', color:'var(--text-primary)', fontSize: d==='⌫' ? 18 : 24, fontWeight:300, cursor: d==='' ? 'default':'pointer', transition:'all 0.15s', backdropFilter:'blur(10px)' }}
              onMouseDown={e => { if(d) e.currentTarget.style.background='rgba(201,169,110,0.15)'; }}
              onMouseUp={e => { e.currentTarget.style.background=d===''?'transparent':'rgba(255,255,255,0.06)'; }}
            >{d}</button>
          ))}
        </div>
        <div style={{ color:'var(--text-muted)', fontSize:11 }}>请输入密码解锁 · 演示密码: 1234</div>
      </div>
    );
  }

  return (
    <div style={{ width:'100vw', height:'100vh', display:'flex', flexDirection:'column', background:'var(--bg-primary)', overflow:'hidden' }} className={sceneFlash ? 'scene-flash' : ''}>
      {/* ── TOP BAR ── */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 28px', borderBottom:'1px solid var(--border)', flexShrink:0, background:'rgba(8,8,9,0.95)', backdropFilter:'blur(20px)', zIndex:10, position:'relative' }}>
        <div className="topbar-line"/>
        <div style={{ display:'flex', alignItems:'center', gap:20 }}>
          <div>
            <div className="gold-text" style={{ fontSize:16, fontWeight:500, letterSpacing:'0.15em' }}>MOORGEN</div>
            <div style={{ fontSize:10, color:'var(--text-muted)', letterSpacing:'0.2em', marginTop:1 }}>SMART LIVING</div>
          </div>
          <div style={{ width:1, height:28, background:'var(--border)' }}/>
          <div>
            <div style={{ color:'var(--text-primary)', fontSize:22, fontWeight:200, letterSpacing:'0.05em' }}>{timeStr}</div>
            <div style={{ color:'var(--text-muted)', fontSize:11 }}>{dateStr}</div>
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:20 }}>
          {/* Weather */}
          <div style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 14px', borderRadius:20, background:'rgba(255,255,255,0.03)', border:'1px solid var(--border)' }}>
            <Icon name="sun" size={14} color="var(--gold-dim)"/>
            <span style={{ color:'var(--text-secondary)', fontSize:13 }}>{state.weather.temp}°C</span>
            <span style={{ color:'var(--text-muted)', fontSize:11 }}>{state.weather.condition}</span>
          </div>
          {/* Security badge */}
          <div style={{ position:'relative', cursor:'pointer' }} onClick={() => setState(s => ({...s, currentRoom:s.currentRoom, currentTab:'security'}))}>
            <div style={{ padding:'6px 14px', borderRadius:20, background: state.security.cameras.some(c=>c.alert) ? 'rgba(248,113,113,0.1)' : 'rgba(255,255,255,0.03)', border:`1px solid ${state.security.cameras.some(c=>c.alert)?'rgba(248,113,113,0.3)':'var(--border)'}`, display:'flex', alignItems:'center', gap:6 }}>
              <Icon name="shield" size={14} color={state.security.cameras.some(c=>c.alert) ? '#f87171' : state.security.armed ? 'var(--gold)' : 'var(--text-muted)'}/>
              <span style={{ fontSize:12, color: state.security.cameras.some(c=>c.alert) ? '#f87171' : state.security.armed ? 'var(--gold)' : 'var(--text-muted)' }}>{state.security.cameras.some(c=>c.alert) ? '警报' : state.security.armed ? '布防' : '未防'}</span>
            </div>
          </div>
          {/* Notifications */}
          <div style={{ position:'relative', cursor:'pointer' }} onClick={() => setState(s => ({...s, notifications:0}))}>
            <Icon name="bell" size={20} color={state.notifications > 0 ? 'var(--gold)' : 'var(--text-muted)'}/>
            {state.notifications > 0 && <div className="badge" style={{ position:'absolute', top:-4, right:-6 }}>{state.notifications}</div>}
          </div>
          {/* Lock */}
          <div style={{ cursor:'pointer', padding:4 }} onClick={() => setLocked(true)}>
            <Icon name="lock" size={18} color="var(--text-muted)"/>
          </div>
        </div>
      </div>

      {/* ── MAIN LAYOUT ── */}
      <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
        {/* ── LEFT SIDEBAR ── */}
        <div style={{ width:90, borderRight:'1px solid var(--border)', display:'flex', flexDirection:'column', alignItems:'center', padding:'20px 0', gap:6, flexShrink:0, background:'rgba(8,8,9,0.8)' }}>
          {/* Overview tab */}
          <div className={`room-tab ${state.currentTab==='overview'?'active':''}`} style={{ width:70, padding:'12px 8px', borderRadius:12, textAlign:'center', background: state.currentTab==='overview' ? 'rgba(201,169,110,0.08)' : 'transparent', marginBottom:8 }}
            onClick={() => setState(s => ({...s, currentTab:'overview'}))}>
            <div className="room-icon" style={{ display:'flex', justifyContent:'center', marginBottom:4 }}>
              <Icon name="star" size={18} color={state.currentTab==='overview' ? 'var(--gold)' : 'var(--text-muted)'}/>
            </div>
            <div style={{ fontSize:10, color: state.currentTab==='overview' ? 'var(--gold)' : 'var(--text-muted)', letterSpacing:'0.05em' }}>总览</div>
          </div>
          <div style={{ width:40, height:1, background:'var(--border)', margin:'4px 0' }}/>
          {/* Room tabs */}
          {Object.entries(state.rooms).map(([id, room]) => {
            const isActive = state.currentTab==='room' && state.currentRoom===id;
            return (
              <div key={id} className={`room-tab ${isActive?'active':''}`}
                style={{ width:70, padding:'10px 8px', borderRadius:12, textAlign:'center', background: isActive ? 'rgba(201,169,110,0.08)' : 'transparent', position:'relative' }}
                onClick={() => setState(s => ({...s, currentRoom:id, currentTab:'room'}))}>
                {room.light > 0 && <div style={{ position:'absolute', top:8, right:10, width:5, height:5, borderRadius:'50%', background:'var(--gold)', opacity:0.7 }}/>}
                <div className="room-icon" style={{ display:'flex', justifyContent:'center', marginBottom:4 }}>
                  <Icon name={room.icon} size={18} color={isActive ? 'var(--gold)' : 'var(--text-muted)'}/>
                </div>
                <div style={{ fontSize:10, color: isActive ? 'var(--gold)' : 'var(--text-muted)', letterSpacing:'0.05em', lineHeight:1.3 }}>{room.name}</div>
              </div>
            );
          })}
          <div style={{ width:40, height:1, background:'var(--border)', margin:'4px 0' }}/>
          {/* Security tab */}
          <div className={`room-tab ${state.currentTab==='security'?'active':''}`}
            style={{ width:70, padding:'10px 8px', borderRadius:12, textAlign:'center', background: state.currentTab==='security' ? 'rgba(201,169,110,0.08)' : 'transparent', position:'relative' }}
            onClick={() => setState(s => ({...s, currentTab:'security'}))}>
            {state.security.cameras.some(c=>c.alert) && <div style={{ position:'absolute', top:8, right:10, width:5, height:5, borderRadius:'50%', background:'#f87171', boxShadow:'0 0 6px #f87171' }}/>}
            <div className="room-icon" style={{ display:'flex', justifyContent:'center', marginBottom:4 }}>
              <Icon name="shield" size={18} color={state.currentTab==='security' ? 'var(--gold)' : 'var(--text-muted)'}/>
            </div>
            <div style={{ fontSize:10, color: state.currentTab==='security' ? 'var(--gold)' : 'var(--text-muted)', letterSpacing:'0.05em' }}>安防</div>
          </div>
        </div>

        {/* ── CONTENT AREA ── */}
        <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
          {/* Content header */}
          <div style={{ padding:'20px 28px 12px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
            <div>
              <div style={{ fontSize:22, fontWeight:300, color:'var(--text-primary)', letterSpacing:'0.02em' }}>
                {state.currentTab==='overview' ? '智能家居总览' : state.currentTab==='security' ? '安防监控' : room.name}
              </div>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:3 }}>
                {state.currentTab==='overview' ? `${Object.values(state.rooms).filter(r=>r.light>0).length} 个空间亮灯 · ${state.scene ? scenes.find(s=>s.id===state.scene)?.name + ' 模式' : '自定义模式'}` :
                 state.currentTab==='security' ? `${state.security.cameras.filter(c=>c.status==='online').length} 路在线 · ${state.security.armed?'已布防':'未布防'}` :
                 `${room.light > 0 ? '灯光开启' : '灯光关闭'} · ${room.temp}°C · 窗帘 ${room.curtain}%`}
              </div>
            </div>
            {state.currentTab==='room' && (
              <div style={{ display:'flex', gap:8 }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 14px', borderRadius:20, background:'rgba(255,255,255,0.03)', border:'1px solid var(--border)' }}>
                  <span style={{ color:'var(--text-muted)', fontSize:12 }}>全部设备</span>
                  <div className={`toggle ${Object.values(state.rooms).some(r=>r.light>0)?'on':''}`} style={{ width:36, height:20 }}
                    onClick={() => Object.keys(state.rooms).forEach(id => updateRoom(id, {light: Object.values(state.rooms).some(r=>r.light>0)?0:70}))}/>
                </div>
              </div>
            )}
          </div>

          {/* Scrollable content */}
          <div style={{ flex:1, overflow:'auto', padding:'0 28px 20px' }} className="page-enter" key={state.currentTab+state.currentRoom}>
            {state.currentTab==='overview' && (
              <OverviewDashboard state={state} onRoomUpdate={updateRoom} onSceneChange={applyScene} energyHistory={energyHistory} tempHistory={tempHistory}/>
            )}
            {state.currentTab==='room' && (
              <RoomDetail roomId={state.currentRoom} room={room} onUpdate={data => updateRoom(state.currentRoom, data)} security={state.security} onSecurityUpdate={sec => setState(s => ({...s, security:{...s.security,...sec}}))}/>
            )}
            {state.currentTab==='security' && (
              <SecurityPanel security={state.security} onUpdate={sec => setState(s => ({...s, security:{...s.security,...sec}}))}/>
            )}
          </div>
        </div>
      </div>

      {/* ── BOTTOM MUSIC BAR ── */}
      <MusicPlayer music={state.music} onUpdate={data => setState(s => ({...s, music:{...s.music,...data}}))}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
